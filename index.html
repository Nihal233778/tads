<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tads Publisher TMA Tester</title>
    <!-- Telegram Mini App initialization -->
    <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
    <!-- tads widget script -->
    <script src="https://w.tads.me/widget.js"></script>
    <!-- NO async attribute to ensure it loads before we use it -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            margin: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: var(--tg-theme-hint-color, #999999); margin-bottom: 24px; }
        .info-box {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-left: 4px solid var(--tg-theme-button-color, #40a7e3);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .quick-select {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .widget-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border: 2px solid var(--tg-theme-button-color, #40a7e3);
            border-radius: 8px;
            color: var(--tg-theme-text-color, #000000);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .widget-btn:hover, .widget-btn.active {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--tg-theme-hint-color, #666666);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #dddddd);
            border-radius: 8px;
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            color: var(--tg-theme-text-color, #000000);
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea { resize: vertical; min-height: 80px; }
        button {
            width: 100%;
            padding: 14px 24px;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        button:active { opacity: 0.8; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #adSection {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--tg-theme-hint-color, #eeeeee);
        }
        #staticAdContainer {
            min-height: 100px;
            margin: 16px 0;
            border: 1px dashed var(--tg-theme-hint-color, #ccc);
            padding: 10px;
        }
        #fullscreenTrigger { margin-top: 16px; }
        .hidden { display: none; }
        .success-message {
            background: #4caf50;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        .error-message {
            background: #f44336;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        .debug-box {
            background: #1e1e1e;
            color: #00ff00;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 Test Your tads Widget</h1>
    <div class="subtitle">Widgets from dashboard: #9548 (Abr) | #9549 (ar)</div>

    <!-- Debug info will appear here -->
    <div id="debugContainer" class="debug-box hidden"></div>

    <div class="quick-select">
        <div class="widget-btn" data-widget="9548" data-name="Abr">📋 #9548 (Abr)</div>
        <div class="widget-btn" data-widget="9549" data-name="ar">📋 #9549 (ar)</div>
    </div>

    <form id="adForm">
        <div class="form-group">
            <label for="widgetId">Widget ID *</label>
            <input type="text" id="widgetId" name="widgetId" required value="9548">
        </div>

        <div class="form-group">
            <label for="adType">Ad Format</label>
            <select id="adType" name="adType">
                <option value="static" selected>📄 Text-Graphic Block (TGB)</option>
                <option value="fullscreen">🖥️ Fullscreen Banner</option>
            </select>
        </div>

        <div class="form-group">
            <label for="rewardType">Reward Type</label>
            <select id="rewardType" name="rewardType">
                <option value="rewarded">🎁 Rewarded</option>
                <option value="non-rewarded">🔹 Non-rewarded</option>
            </select>
        </div>

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="Abr">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">Test widget from dashboard</textarea>
        </div>

        <button type="submit" id="submitBtn">🚀 Load Ad</button>
    </form>

    <div id="adSection" class="hidden">
        <h2>Ad Preview <span id="activeWidgetBadge" style="background:var(--tg-theme-button-color); color:white; padding:2px 8px; border-radius:4px;">#9548</span></h2>
        <div id="staticAdContainer"></div>
        <button id="fullscreenTrigger" class="hidden">Show Fullscreen Ad</button>
    </div>

    <div id="messageContainer"></div>
<script>
(function() {
    // Global unhandled rejection handler
    window.addEventListener('unhandledrejection', function(event) {
        console.error('UNHANDLED REJECTION:', event.reason);
        const debugDiv = document.getElementById('debugContainer');
        if (debugDiv) {
            debugDiv.innerHTML += `[UNHANDLED] ${JSON.stringify(event.reason)}\n`;
        }
    });

    function debugLog(...args) {
        console.log('[DEBUG]', ...args);
        const debugDiv = document.getElementById('debugContainer');
        if (debugDiv) {
            debugDiv.classList.remove('hidden');
            const timestamp = new Date().toLocaleTimeString();
            const strings = args.map(arg => {
                try {
                    if (arg === null) return 'null';
                    if (arg === undefined) return 'undefined';
                    if (typeof arg === 'object') return JSON.stringify(arg);
                    return String(arg);
                } catch (e) {
                    return '[unstringifiable]';
                }
            });
            debugDiv.innerHTML += `[${timestamp}] ${strings.join(' ')}\n`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }
    }

    function clearDebug() {
        const debugDiv = document.getElementById('debugContainer');
        if (debugDiv) debugDiv.innerHTML = '';
    }

    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.ready();
        debugLog('Telegram WebApp initialized');
    }

    // DOM elements
    const form = document.getElementById('adForm');
    const widgetIdInput = document.getElementById('widgetId');
    const adTypeSelect = document.getElementById('adType');
    const rewardTypeSelect = document.getElementById('rewardType');
    const nameInput = document.getElementById('name');
    const descInput = document.getElementById('description');
    const submitBtn = document.getElementById('submitBtn');
    const adSection = document.getElementById('adSection');
    const staticContainer = document.getElementById('staticAdContainer');
    const fullscreenBtn = document.getElementById('fullscreenTrigger');
    const msgContainer = document.getElementById('messageContainer');
    const activeWidgetBadge = document.getElementById('activeWidgetBadge');
    const widgetBtns = document.querySelectorAll('.widget-btn');

    let currentAdController = null;
    let currentWidgetId = '9548';
    let isLoading = false; // Prevent concurrent loads

    function showMessage(type, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = type === 'success' ? 'success-message' : 'error-message';
        msgDiv.textContent = text;
        msgContainer.innerHTML = '';
        msgContainer.appendChild(msgDiv);
        setTimeout(() => msgDiv.remove(), 4000);
    }

    function resetAdDisplay() {
        debugLog('Resetting ad display...');
        
        // Hide section
        adSection.classList.add('hidden');
        
        // Completely clear the container - remove all children
        while (staticContainer.firstChild) {
            staticContainer.removeChild(staticContainer.firstChild);
        }
        
        // Hide fullscreen button
        fullscreenBtn.classList.add('hidden');
        
        // Clear controller reference
        currentAdController = null;
        
        // Force garbage collection hint (not actual GC, but helps)
        if (window.tads && window.tads.controllers) {
            // If tads stores controllers by ID, we can try to clean them
            debugLog('Tads controllers before cleanup:', Object.keys(window.tads.controllers || {}));
        }
        
        debugLog('Display reset complete');
    }

    function setActiveWidget(widgetId) {
        widgetBtns.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.widget === widgetId);
        });
        if (activeWidgetBadge) activeWidgetBadge.textContent = `#${widgetId}`;
    }

    function checkTads() {
        debugLog('window.tads exists:', !!window.tads);
        if (window.tads) {
            debugLog('tads.init exists:', typeof window.tads.init === 'function');
            debugLog('tads object keys:', Object.keys(window.tads));
            debugLog('tads.controllers:', window.tads.controllers ? Object.keys(window.tads.controllers) : 'none');
        }
        return window.tads && typeof window.tads.init === 'function';
    }

    function waitForTads(timeout = 10000) {
        return new Promise((resolve, reject) => {
            if (checkTads()) {
                debugLog('tads already available');
                return resolve();
            }
            debugLog('Waiting for tads to load...');
            const start = Date.now();
            const interval = setInterval(() => {
                if (checkTads()) {
                    clearInterval(interval);
                    debugLog('tads loaded successfully');
                    resolve();
                } else if (Date.now() - start > timeout) {
                    clearInterval(interval);
                    reject(new Error('tads widget script failed to load'));
                }
            }, 100);
        });
    }

    function normalizeWidgetId(id) {
        return id.replace(/^#/, '');
    }

    async function loadAd(widgetId, adType, rewardType, widgetName = '') {
        // Prevent multiple simultaneous loads
        if (isLoading) {
            debugLog('Already loading, please wait...');
            showMessage('error', 'Already loading, please wait...');
            return;
        }
        
        isLoading = true;
        clearDebug();
        debugLog('Starting ad load process...');
        debugLog('Widget ID:', widgetId);
        debugLog('Ad Type:', adType);
        debugLog('Reward Type:', rewardType);

        try {
            await waitForTads();

            const normalizedId = normalizeWidgetId(widgetId);
            debugLog('Normalized widget ID:', normalizedId);

            // COMPLETE RESET before anything else
            resetAdDisplay();
            
            // Small delay to ensure DOM is clean
            await new Promise(r => setTimeout(r, 50));
            
            currentWidgetId = normalizedId;
            setActiveWidget(normalizedId);

            // Create container BEFORE init
            if (adType === 'static') {
                const containerId = `tads-container-${normalizedId}`;
                debugLog('Creating container with ID:', containerId);
                
                // Create fresh container
                const containerDiv = document.createElement('div');
                containerDiv.id = containerId;
                containerDiv.style.minHeight = '100px';
                containerDiv.style.border = '1px dashed #ccc';
                containerDiv.style.padding = '10px';
                containerDiv.style.margin = '10px 0';
                
                // Append to static container
                staticContainer.appendChild(containerDiv);

                // Verify container exists
                const container = document.getElementById(containerId);
                debugLog('Container found:', !!container);
                if (!container) {
                    throw new Error('Failed to create container element');
                }
                
                debugLog('Container parent:', container.parentElement?.id);
            }

            // Define callbacks
            const onAdsNotFound = () => {
                debugLog('Callback: No ads found');
                showMessage('error', 'No ads available for this Widget ID');
            };

            let onClickReward = null;
            let onShowReward = null;

            if (rewardType === 'rewarded') {
                if (adType === 'static') {
                    onClickReward = (adId) => {
                        debugLog('Callback: Click reward - Ad ID:', adId);
                        showMessage('success', `🎉 Click reward for #${normalizedId}`);
                    };
                } else {
                    onShowReward = (result) => {
                        debugLog('Callback: Show reward - Result:', result);
                        showMessage('success', `🎁 View reward for #${normalizedId}`);
                    };
                }
            }

            // Initialize tads
            debugLog('Initializing tads with widget ID:', normalizedId);
            currentAdController = window.tads.init({
                widgetId: normalizedId,
                type: adType,
                debug:false,
                onClickReward: onClickReward,
                onShowReward: onShowReward,
                onAdsNotFound: onAdsNotFound
            });

            debugLog('Ad controller created:', !!currentAdController);

            if (adType === 'static') {
                debugLog('Calling loadAd()...');
                await currentAdController.loadAd();
                debugLog('loadAd() completed');

                // Small delay to ensure ad is ready
                await new Promise(r => setTimeout(r, 200));

                debugLog('Calling showAd()...');
                await currentAdController.showAd();
                debugLog('showAd() completed successfully');

                adSection.classList.remove('hidden');
                showMessage('success', `✅ Ad loaded for #${normalizedId}`);
            } else {
                // Fullscreen: prepare button
                fullscreenBtn.classList.remove('hidden');
                adSection.classList.remove('hidden');

                // Remove all old listeners by cloning
                const newBtn = fullscreenBtn.cloneNode(true);
                fullscreenBtn.parentNode.replaceChild(newBtn, fullscreenBtn);
                
                // Get fresh reference
                const updatedBtn = document.getElementById('fullscreenTrigger');
                
                // Add new listener
                updatedBtn.addEventListener('click', async () => {
                    if (currentAdController) {
                        try {
                            debugLog('Fullscreen: showing ad...');
                            await currentAdController.showAd();
                            debugLog('Fullscreen: ad shown');
                        } catch (err) {
                            debugLog('Fullscreen showAd error:', err);
                            onAdsNotFound();
                        }
                    } else {
                        debugLog('Fullscreen: no controller');
                    }
                });
                
                showMessage('success', `✅ Fullscreen ready for #${normalizedId}`);
            }

        } catch (error) {
            debugLog('>>> ERROR IN loadAd:');
            if (error instanceof Error) {
                debugLog('message:', error.message);
                debugLog('stack:', error.stack);
            } else {
                debugLog('Caught non-Error:', error);
                debugLog('Type:', typeof error);
                try {
                    debugLog('Stringified:', JSON.stringify(error));
                } catch (e) {}
            }
            showMessage('error', `Failed: ${error?.message || 'Unknown error'}`);
            resetAdDisplay();
        } finally {
            isLoading = false;
            debugLog('Load process finished');
        }
    }

    // Quick select buttons
    widgetBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const widgetId = btn.dataset.widget;
            const widgetName = btn.dataset.name;
            widgetIdInput.value = widgetId;
            nameInput.value = widgetName || '';
            adTypeSelect.value = 'static'; // Your widgets are TGB
            setActiveWidget(widgetId);
            showMessage('success', `Selected #${widgetId} (${widgetName})`);
        });
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const widgetId = widgetIdInput.value.trim();
        const adType = adTypeSelect.value;
        const rewardType = rewardTypeSelect.value;
        const name = nameInput.value.trim();
        const desc = descInput.value.trim();

        if (!widgetId) {
            showMessage('error', 'Enter a Widget ID');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Loading...';

        await loadAd(widgetId, adType, rewardType, name);

        submitBtn.disabled = false;
        submitBtn.textContent = '🚀 Load Ad';
    });

    // Set default active widget
    setActiveWidget('9548');
    
    window.addEventListener('load', () => {
        debugLog('Page loaded');
        checkTads();
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
        if (currentAdController) {
            // Attempt to clean up if tads provides a method
            debugLog('Cleaning up on unload');
        }
    });
})();
</script>
   </body>
</html>
