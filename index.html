<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tads Publisher TMA Tester</title>
    <!-- Telegram Mini App initialization -->
    <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
    <!-- tads widget script -->
    <script src="https://w.tads.me/widget.js"></script>
    <!-- NO async attribute to ensure it loads before we use it -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            margin: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: var(--tg-theme-hint-color, #999999); margin-bottom: 24px; }
        .info-box {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-left: 4px solid var(--tg-theme-button-color, #40a7e3);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .quick-select {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .widget-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border: 2px solid var(--tg-theme-button-color, #40a7e3);
            border-radius: 8px;
            color: var(--tg-theme-text-color, #000000);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .widget-btn:hover, .widget-btn.active {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--tg-theme-hint-color, #666666);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #dddddd);
            border-radius: 8px;
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            color: var(--tg-theme-text-color, #000000);
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea { resize: vertical; min-height: 80px; }
        button {
            width: 100%;
            padding: 14px 24px;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        button:active { opacity: 0.8; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #adSection {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--tg-theme-hint-color, #eeeeee);
        }
        #staticAdContainer {
            min-height: 100px;
            margin: 16px 0;
            border: 1px dashed var(--tg-theme-hint-color, #ccc);
            padding: 10px;
        }
        #fullscreenTrigger { margin-top: 16px; }
        .hidden { display: none; }
        .success-message {
            background: #4caf50;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        .error-message {
            background: #f44336;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        .debug-box {
            background: #1e1e1e;
            color: #00ff00;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 Test Your tads Widget</h1>
    <div class="subtitle">Widgets from dashboard: #9548 (Abr) | #9549 (ar)</div>

    <!-- Debug info will appear here -->
    <div id="debugContainer" class="debug-box hidden"></div>

    <div class="quick-select">
        <div class="widget-btn" data-widget="9548" data-name="Abr">📋 #9548 (Abr)</div>
        <div class="widget-btn" data-widget="9549" data-name="ar">📋 #9549 (ar)</div>
    </div>

    <form id="adForm">
        <div class="form-group">
            <label for="widgetId">Widget ID *</label>
            <input type="text" id="widgetId" name="widgetId" required value="9548">
        </div>

        <div class="form-group">
            <label for="adType">Ad Format</label>
            <select id="adType" name="adType">
                <option value="static" selected>📄 Text-Graphic Block (TGB)</option>
                <option value="fullscreen">🖥️ Fullscreen Banner</option>
            </select>
        </div>

        <div class="form-group">
            <label for="rewardType">Reward Type</label>
            <select id="rewardType" name="rewardType">
                <option value="rewarded">🎁 Rewarded</option>
                <option value="non-rewarded">🔹 Non-rewarded</option>
            </select>
        </div>

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="Abr">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">Test widget from dashboard</textarea>
        </div>

        <button type="submit" id="submitBtn">🚀 Load Ad</button>
    </form>

    <div id="adSection" class="hidden">
        <h2>Ad Preview <span id="activeWidgetBadge" style="background:var(--tg-theme-button-color); color:white; padding:2px 8px; border-radius:4px;">#9548</span></h2>
        <div id="staticAdContainer"></div>
        <button id="fullscreenTrigger" class="hidden">Show Fullscreen Ad</button>
    </div>

    <div id="messageContainer"></div>

    <script>
        (function() {
            // Debug logging
            function debugLog(...args) {
                console.log('[DEBUG]', ...args);
                const debugDiv = document.getElementById('debugContainer');
                debugDiv.classList.remove('hidden');
                const timestamp = new Date().toLocaleTimeString();
                debugDiv.innerHTML += `[${timestamp}] ${args.join(' ')}\n`;
                debugDiv.scrollTop = debugDiv.scrollHeight;
            }

            // Clear debug log
            function clearDebug() {
                document.getElementById('debugContainer').innerHTML = '';
            }

            // Telegram WebApp
            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.expand();
                tg.ready();
                debugLog('Telegram WebApp initialized');
            } else {
                debugLog('WARNING: Telegram WebApp not available');
            }

            // DOM elements
            const form = document.getElementById('adForm');
            const widgetIdInput = document.getElementById('widgetId');
            const adTypeSelect = document.getElementById('adType');
            const rewardTypeSelect = document.getElementById('rewardType');
            const nameInput = document.getElementById('name');
            const descInput = document.getElementById('description');
            const submitBtn = document.getElementById('submitBtn');
            const adSection = document.getElementById('adSection');
            const staticContainer = document.getElementById('staticAdContainer');
            const fullscreenBtn = document.getElementById('fullscreenTrigger');
            const msgContainer = document.getElementById('messageContainer');
            const activeWidgetBadge = document.getElementById('activeWidgetBadge');
            const widgetBtns = document.querySelectorAll('.widget-btn');

            // State
            let currentAdController = null;
            let currentWidgetId = '9548';

            function showMessage(type, text) {
                const msgDiv = document.createElement('div');
                msgDiv.className = type === 'success' ? 'success-message' : 'error-message';
                msgDiv.textContent = text;
                msgContainer.innerHTML = '';
                msgContainer.appendChild(msgDiv);
                setTimeout(() => msgDiv.remove(), 4000);
            }

            function resetAdDisplay() {
                adSection.classList.add('hidden');
                staticContainer.innerHTML = '';
                fullscreenBtn.classList.add('hidden');
                currentAdController = null;
            }

            function setActiveWidget(widgetId) {
                widgetBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.widget === widgetId);
                });
                activeWidgetBadge.textContent = `#${widgetId}`;
            }

            // Check if tads is available
            function checkTads() {
                debugLog('Checking tads availability...');
                debugLog('window.tads exists:', !!window.tads);
                if (window.tads) {
                    debugLog('tads.init exists:', typeof window.tads.init === 'function');
                    debugLog('tads object keys:', Object.keys(window.tads));
                }
                return window.tads && typeof window.tads.init === 'function';
            }

            // Wait for tads with better detection
            function waitForTads(timeout = 10000) {
                return new Promise((resolve, reject) => {
                    if (checkTads()) {
                        debugLog('tads already available');
                        return resolve();
                    }

                    debugLog('Waiting for tads to load...');
                    const start = Date.now();
                    const interval = setInterval(() => {
                        if (checkTads()) {
                            clearInterval(interval);
                            debugLog('tads loaded successfully');
                            resolve();
                        } else if (Date.now() - start > timeout) {
                            clearInterval(interval);
                            reject(new Error('tads widget script failed to load'));
                        }
                    }, 100);
                });
            }

            // Try different ID formats
            function tryWidgetIdFormats(baseId) {
                // Try both formats that tads might expect
                return [
                    baseId,                          // 9548
                    baseId.toString(),               // "9548"
                    `#${baseId}`,                    // #9548
                    baseId.replace('#', '')          // remove # if present
                ];
            }

            async function loadAd(widgetId, adType, rewardType, widgetName = '') {
                clearDebug();
                debugLog('Starting ad load process...');
                debugLog('Widget ID:', widgetId);
                debugLog('Ad Type:', adType);
                debugLog('Reward Type:', rewardType);

                try {
                    // Wait for tads
                    await waitForTads();
                    
                    // Double check tads is ready
                    if (!window.tads || typeof window.tads.init !== 'function') {
                        throw new Error('tads.init is not a function');
                    }

                    resetAdDisplay();
                    currentWidgetId = widgetId;
                    setActiveWidget(widgetId);

                    // Try different ID formats
                    const idFormats = tryWidgetIdFormats(widgetId);
                    debugLog('Trying ID formats:', idFormats);

                    // Callbacks
                    const onAdsNotFound = () => {
                        debugLog('Callback: No ads found');
                        showMessage('error', 'No ads available for this Widget ID');
                    };

                    let onClickReward = null;
                    let onShowReward = null;

                    if (rewardType === 'rewarded') {
                        if (adType === 'static') {
                            onClickReward = (adId) => {
                                debugLog('Callback: Click reward - Ad ID:', adId);
                                showMessage('success', `🎉 Click reward for #${widgetId}`);
                            };
                        } else {
                            onShowReward = (result) => {
                                debugLog('Callback: Show reward - Result:', result);
                                showMessage('success', `🎁 View reward for #${widgetId}`);
                            };
                        }
                    }

                    // Try initializing with first format
                    debugLog('Initializing tads with widget ID:', idFormats[0]);
                    
                    currentAdController = window.tads.init({
                        widgetId: idFormats[0],
                        type: adType,
                        debug: true,
                        onClickReward: onClickReward,
                        onShowReward: onShowReward,
                        onAdsNotFound: onAdsNotFound
                    });

                    debugLog('Ad controller created:', !!currentAdController);

                    if (adType === 'static') {
                        // Create container
                        const containerId = `tads-container-${idFormats[0]}`;
                        debugLog('Creating container with ID:', containerId);
                        
                        staticContainer.innerHTML = `<div id="${containerId}" style="min-height:100px;"></div>`;
                        
                        // Verify container exists
                        const container = document.getElementById(containerId);
                        debugLog('Container found:', !!container);

                        // Load ad
                        debugLog('Calling loadAd()...');
                        await currentAdController.loadAd();
                        debugLog('loadAd() completed');

                        // Show ad
                        debugLog('Calling showAd()...');
                        await currentAdController.showAd();
                        debugLog('showAd() completed');

                        adSection.classList.remove('hidden');
                        showMessage('success', `✅ Ad loaded for #${widgetId}`);
                    }

                } catch (error) {
            debugLog('ERROR:', error.message);
                    debugLog('Error stack:', error.stack);
                    showMessage('error', `Failed: ${error.message}`);
                    resetAdDisplay();
                }
            }

            // Quick select buttons
            widgetBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const widgetId = btn.dataset.widget;
                    const widgetName = btn.dataset.name;
                    
                    widgetIdInput.value = widgetId;
                    nameInput.value = widgetName || '';
                    adTypeSelect.value = 'static'; // Both your widgets are TGB
                    setActiveWidget(widgetId);
                    showMessage('success', `Selected #${widgetId} (${widgetName})`);
                });
            });

            // Form submit
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const widgetId = widgetIdInput.value.trim();
                const adType = adTypeSelect.value;
                const rewardType = rewardTypeSelect.value;
                const name = nameInput.value.trim();
                const desc = descInput.value.trim();

                if (!widgetId) {
                    showMessage('error', 'Enter a Widget ID');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = '⏳ Loading...';

                await loadAd(widgetId, adType, rewardType, name);

                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Load Ad';
            });

            // Set default
            setActiveWidget('9548');
            
            // Check tads availability on load
            window.addEventListener('load', () => {
                debugLog('Page loaded');
                checkTads();
            });

        })();
    </script>
</body>
</html>
